[[bench]]
name = "hdel_lfu_collapse"
harness = false

# A/B for the LFU SREM write-side keyspace-probe collapse: resolve the entry once and draw through
# the disjoint rng_seed field after a hit (1 probe) vs the prior contains_key rand gate + get_mut
# (2 probes). Missing-member SREM is the repeatable, production-valid timed shape.
[[bench]]
name = "srem_lfu_collapse"
harness = false

# A/B for the LFU SETBIT write-side keyspace-probe collapse: get_mut-first + rng_seed field-split
